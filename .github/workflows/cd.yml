name: "CD"
on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*
jobs:
  publish:
    runs-on: ubuntu-latest

    # container:
    #   image: fedora:latest

    environment:
      name: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version-file: ".python-version"
          version: "0.9.26"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish --index testpypi
